<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Automated email funnel with lead scoring">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0a"/>
      <stop offset="1" stop-color="#0f1714"/>
    </linearGradient>
    <linearGradient id="fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg2)"/>
  <text x="64" y="92" fill="#f5f5f5" font-family="ui-sans-serif,system-ui,sans-serif" font-size="44" font-weight="700">Automated Email Funnel + Lead Scoring</text>
  <text x="64" y="136" fill="#10b981" font-family="ui-sans-serif,system-ui,sans-serif" font-size="24" font-weight="600">Zapier · HubSpot · Klaviyo  80% automated nurture</text>

  <!-- funnel stages -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <polygon points="160,200 1040,200 950,272 250,272" fill="url(#fill)" opacity="0.95"/>
    <text x="600" y="247" fill="#062c22" font-size="26" font-weight="700" text-anchor="middle">Leads captured  2,000+ contacts</text>

    <polygon points="262,296 938,296 866,368 334,368" fill="url(#fill)" opacity="0.78"/>
    <text x="600" y="343" fill="#062c22" font-size="24" font-weight="700" text-anchor="middle">Scored &amp; segmented (point-based)</text>

    <polygon points="346,392 854,392 782,464 418,464" fill="url(#fill)" opacity="0.6"/>
    <text x="600" y="439" fill="#062c22" font-size="24" font-weight="700" text-anchor="middle">Nurtured  35% engagement lift</text>

    <polygon points="430,488 770,488 698,548 502,548" fill="url(#fill)" opacity="0.45"/>
    <text x="600" y="525" fill="#04231b" font-size="22" font-weight="700" text-anchor="middle">Sales-ready (50+ score)</text>
  </g>

  <!-- side metrics -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <text x="1136" y="320" fill="#34d399" font-size="40" font-weight="800" text-anchor="end">80%</text>
    <text x="1136" y="348" fill="#a3a3a3" font-size="18" text-anchor="end">automated</text>
    <text x="64" y="440" fill="#34d399" font-size="40" font-weight="800">40%</text>
    <text x="64" y="468" fill="#a3a3a3" font-size="18">faster response</text>
  </g>
</svg>

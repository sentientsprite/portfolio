<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Automated email funnel with lead scoring results">
  <defs>
    <linearGradient id="ef-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#0c1512"/>
    </linearGradient>
    <linearGradient id="ef-fill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ef-bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#ef-fill)"/>

  <!-- Header -->
  <text x="64" y="78" fill="#fafafa" font-family="ui-sans-serif,system-ui,sans-serif" font-size="40" font-weight="800" letter-spacing="-0.5">Automated Email Funnel + Lead Scoring</text>
  <text x="64" y="116" fill="#34d399" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="600">Zapier · HubSpot · Klaviyo — behavior-based nurture</text>

  <!-- Funnel stages (centered trapezoids) -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <polygon points="300,170 900,170 850,232 350,232" fill="url(#ef-fill)" opacity="0.95"/>
    <text x="600" y="210" fill="#04231b" font-size="24" font-weight="700" text-anchor="middle">Leads captured — 2,000+ contacts</text>

    <polygon points="358,248 842,248 800,310 400,310" fill="url(#ef-fill)" opacity="0.8"/>
    <text x="600" y="288" fill="#04231b" font-size="22" font-weight="700" text-anchor="middle">Scored &amp; segmented (point-based)</text>

    <polygon points="408,326 792,326 750,388 450,388" fill="url(#ef-fill)" opacity="0.62"/>
    <text x="600" y="366" fill="#04231b" font-size="22" font-weight="700" text-anchor="middle">Nurtured — +35% engagement</text>

    <polygon points="458,404 742,404 700,466 500,466" fill="url(#ef-fill)" opacity="0.45"/>
    <text x="600" y="444" fill="#052e22" font-size="21" font-weight="700" text-anchor="middle">Routed to sales (50+ score)</text>
  </g>

  <!-- Side metric cards -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <rect x="64" y="200" width="180" height="110" rx="14" fill="#111113" stroke="#27272a"/>
    <text x="154" y="258" fill="#34d399" font-size="40" font-weight="800" text-anchor="middle">80%</text>
    <text x="154" y="288" fill="#a1a1aa" font-size="16" text-anchor="middle">emails automated</text>

    <rect x="956" y="200" width="180" height="110" rx="14" fill="#111113" stroke="#27272a"/>
    <text x="1046" y="258" fill="#34d399" font-size="40" font-weight="800" text-anchor="middle">40%</text>
    <text x="1046" y="288" fill="#a1a1aa" font-size="16" text-anchor="middle">faster response</text>

    <rect x="64" y="330" width="180" height="110" rx="14" fill="#111113" stroke="#27272a"/>
    <text x="154" y="388" fill="#34d399" font-size="40" font-weight="800" text-anchor="middle">35%</text>
    <text x="154" y="418" fill="#a1a1aa" font-size="16" text-anchor="middle">engagement lift</text>

    <rect x="956" y="330" width="180" height="110" rx="14" fill="#111113" stroke="#27272a"/>
    <text x="1046" y="388" fill="#34d399" font-size="40" font-weight="800" text-anchor="middle">12%</text>
    <text x="1046" y="418" fill="#a1a1aa" font-size="16" text-anchor="middle">cart recovery</text>
  </g>

  <!-- Footer tag -->
  <text x="64" y="560" fill="#52525b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16">B2B technology · marketing automation · CRM integration</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="E-commerce landing page redesign: before vs after results">
  <defs>
    <linearGradient id="ec-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0b0d"/>
      <stop offset="1" stop-color="#0c1512"/>
    </linearGradient>
    <linearGradient id="ec-after" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#059669"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="ec-before" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#3f3f46"/>
      <stop offset="1" stop-color="#52525b"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ec-bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#ec-after)"/>

  <!-- Header -->
  <text x="64" y="78" fill="#fafafa" font-family="ui-sans-serif,system-ui,sans-serif" font-size="40" font-weight="800" letter-spacing="-0.5">E-commerce Landing Page Redesign</text>
  <text x="64" y="116" fill="#34d399" font-family="ui-sans-serif,system-ui,sans-serif" font-size="22" font-weight="600">Themed Shopify pages · A/B tested over 6 weeks</text>

  <!-- Legend -->
  <g font-family="ui-sans-serif,system-ui,sans-serif" font-size="18">
    <rect x="900" y="60" width="18" height="18" rx="4" fill="url(#ec-before)"/>
    <text x="926" y="75" fill="#a1a1aa">Before</text>
    <rect x="1010" y="60" width="18" height="18" rx="4" fill="url(#ec-after)"/>
    <text x="1036" y="75" fill="#a1a1aa">After</text>
  </g>

  <!-- Chart gridlines -->
  <g stroke="#1f1f23" stroke-width="1">
    <line x1="64" y1="200" x2="1136" y2="200"/>
    <line x1="64" y1="300" x2="1136" y2="300"/>
    <line x1="64" y1="400" x2="1136" y2="400"/>
    <line x1="64" y1="500" x2="1136" y2="500"/>
  </g>
  <line x1="64" y1="500" x2="1136" y2="500" stroke="#3f3f46" stroke-width="2"/>

  <!-- Bars: each group normalized so "better" is taller -->
  <g font-family="ui-sans-serif,system-ui,sans-serif">
    <!-- Conversion rate -->
    <rect x="150" y="390" width="80" height="110" rx="8" fill="url(#ec-before)"/>
    <rect x="250" y="304" width="80" height="196" rx="8" fill="url(#ec-after)"/>
    <text x="190" y="378" fill="#a1a1aa" font-size="19" text-anchor="middle">2.1%</text>
    <text x="290" y="292" fill="#34d399" font-size="22" font-weight="700" text-anchor="middle">3.0%</text>
    <text x="240" y="532" fill="#d4d4d8" font-size="20" text-anchor="middle">Conversion Rate</text>
    <text x="240" y="558" fill="#10b981" font-size="17" font-weight="700" text-anchor="middle">+45%</text>

    <!-- Bounce rate (lower better ? after shorter) -->
    <rect x="420" y="300" width="80" height="200" rx="8" fill="url(#ec-before)"/>
    <rect x="520" y="355" width="80" height="145" rx="8" fill="url(#ec-after)"/>
    <text x="460" y="288" fill="#a1a1aa" font-size="19" text-anchor="middle">62%</text>
    <text x="560" y="343" fill="#34d399" font-size="22" font-weight="700" text-anchor="middle">45%</text>
    <text x="510" y="532" fill="#d4d4d8" font-size="20" text-anchor="middle">Bounce Rate</text>
    <text x="510" y="558" fill="#10b981" font-size="17" font-weight="700" text-anchor="middle">-28%</text>

    <!-- PageSpeed -->
    <rect x="690" y="384" width="80" height="116" rx="8" fill="url(#ec-before)"/>
    <rect x="790" y="318" width="80" height="182" rx="8" fill="url(#ec-after)"/>
    <text x="730" y="372" fill="#a1a1aa" font-size="19" text-anchor="middle">58</text>
    <text x="830" y="306" fill="#34d399" font-size="22" font-weight="700" text-anchor="middle">91</text>
    <text x="780" y="532" fill="#d4d4d8" font-size="20" text-anchor="middle">PageSpeed</text>
    <text x="780" y="558" fill="#10b981" font-size="17" font-weight="700" text-anchor="middle">+33 pts</text>

    <!-- Session duration -->
    <rect x="960" y="412" width="80" height="88" rx="8" fill="url(#ec-before)"/>
    <rect x="1060" y="300" width="80" height="200" rx="8" fill="url(#ec-after)"/>
    <text x="1000" y="400" fill="#a1a1aa" font-size="19" text-anchor="middle">1:12</text>
    <text x="1100" y="288" fill="#34d399" font-size="22" font-weight="700" text-anchor="middle">2:45</text>
    <text x="1050" y="532" fill="#d4d4d8" font-size="20" text-anchor="middle">Avg. Session</text>
    <text x="1050" y="558" fill="#10b981" font-size="17" font-weight="700" text-anchor="middle">+129%</text>
  </g>

  <!-- Footer tag -->
  <text x="64" y="600" fill="#52525b" font-family="ui-sans-serif,system-ui,sans-serif" font-size="16">Wellness brand · Shopify · conversion optimization</text>
</svg>
